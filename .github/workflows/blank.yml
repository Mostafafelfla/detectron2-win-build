name: Build Universal Detectron2 Wheels

on:
  workflow_dispatch: # للتشغيل اليدوي

jobs:
  build:
    runs-on: windows-2022
    strategy:
      matrix:
        # هنا نخبر السيرفر أن يبني نسختين مختلفتين في نفس الوقت
        device: [cuda, cpu] 

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install CUDA Toolkit (Only for GPU version)
      if: matrix.device == 'cuda'
      uses: Jimver/cuda-toolkit@v0.2.14
      with:
        cuda: '11.8.0' 

    - name: Install PyTorch and Tools
      run: |
        python -m pip install --upgrade pip
        pip install ninja wheel setuptools
        if ('${{ matrix.device }}' -eq 'cuda') {
            pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu118
        } else {
            pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        }
      shell: powershell

    - name: Clone Detectron2
      run: git clone https://github.com/facebookresearch/detectron2.git

    - name: Build Detectron2 Wheel
      working-directory: detectron2
      run: |
        $env:DISTUTILS_USE_SDK = "1"
        if ('${{ matrix.device }}' -eq 'cuda') {
            # السر هنا: أضفنا كل المعماريات الممكنة لتدعم أي كارت شاشة من NVIDIA
            $env:TORCH_CUDA_ARCH_LIST = "5.2;6.0;6.1;7.0;7.5;8.0;8.6;8.9;9.0+PTX"
            $env:FORCE_CUDA = "1"
            Write-Host "Building FULL CUDA VERSION..."
        } else {
            $env:FORCE_CUDA = "0"
            Write-Host "Building UNIVERSAL CPU VERSION..."
        }
        python setup.py bdist_wheel
      shell: powershell

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        # سيتم استخراج ملفين، واحد للـ GPU وواحد للـ CPU
        name: detectron2-windows-${{ matrix.device }}-wheel
        path: detectron2/dist/*.whl
