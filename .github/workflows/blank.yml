name: Build Detectron2 Wheel (CUDA Windows)

on:
  workflow_dispatch:

jobs:
  build-cuda:
    runs-on: windows-2022

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # تهيئة بيئة التطوير الخاصة بويندوز
    - name: Enable MSVC (C++ Compiler)
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.17
      with:
        cuda: '11.8.0' 
        method: 'network'
        use-github-cache: 'false'
        use-local-cache: 'false'

    - name: Install PyTorch and Tools
      run: |
        python -m pip install --upgrade pip
        pip install ninja wheel setuptools
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu118
      shell: powershell

    # 🔥 التغيير الجذري هنا: تحميل النسخة المعدلة لتتوافق مع ويندوز بدلاً من الرسمية 🔥
    - name: Clone Detectron2 (Windows Optimized Fork)
      run: git clone https://github.com/conansherry/detectron2.git

    - name: Build Detectron2 Wheel (CUDA)
      working-directory: detectron2
      run: |
        $env:DISTUTILS_USE_SDK = "1"
        $env:FORCE_CUDA = "1"
        $env:MAX_JOBS = "1"
        $env:TORCH_CUDA_ARCH_LIST = "6.0;6.1;7.0;7.5;8.0;8.6;8.9"
        
        Write-Host "Building Windows-Optimized CUDA VERSION..."
        python setup.py bdist_wheel
      shell: powershell

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: detectron2-windows-cuda-wheel
        path: detectron2/dist/*.whl
