name: Build Detectron2 Wheel (CUDA Windows)

on:
  workflow_dispatch:

jobs:
  build-cuda:
    runs-on: windows-2022

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Enable MSVC (C++ Compiler)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.17
      with:
        cuda: '11.8.0' 
        method: 'network'

    - name: Install PyTorch and Tools
      run: |
        python -m pip install --upgrade pip
        # 🔥 السر الأول: استخدام إصدار setuptools قديم لتجنب انهيار المترجم
        pip install ninja wheel "setuptools<70.0"
        # 🔥 السر الثاني: تثبيت إصدار PyTorch (2.4.1) المستقر جداً في بناء C++
        pip install torch==2.4.1+cu118 torchvision==0.19.1+cu118 torchaudio==2.4.1+cu118 --index-url https://download.pytorch.org/whl/cu118
      shell: powershell

    - name: Clone Detectron2 (Official)
      run: git clone https://github.com/facebookresearch/detectron2.git

    - name: Build Detectron2 Wheel (CUDA)
      working-directory: detectron2
      run: |
        $env:DISTUTILS_USE_SDK = "1"
        $env:MSSdk = "1"
        $env:FORCE_CUDA = "1"
        $env:MAX_JOBS = "2"
        
        # 🔥 السر الثالث: تخفيف المعماريات لمنع امتلاء الرام.
        # (7.5 تدعم كارت GTX 1650 بالكامل، وباقي الأرقام لسلسلة RTX الحديثة)
        $env:TORCH_CUDA_ARCH_LIST = "7.5;8.0;8.6;8.9"
        
        Write-Host "Building Official CUDA VERSION safely..."
        python setup.py bdist_wheel
      shell: powershell

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: detectron2-windows-cuda-wheel
        path: detectron2/dist/*.whl
