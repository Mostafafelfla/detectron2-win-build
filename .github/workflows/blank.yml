name: Build Detectron2 Wheel (CUDA Only)

on:
  workflow_dispatch:

jobs:
  build-cuda:
    runs-on: windows-2022

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 🔥 خطوة جديدة: تثبيت بيئة التطوير C++ كاملة الخاصة بويندوز 🔥
    - name: Install Windows C++ Build Tools
      uses: microsoft/setup-msbuild@v2

    - name: Install CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.17
      with:
        cuda: '11.8.0' 
        method: 'network'

    - name: Install PyTorch and Tools
      run: |
        python -m pip install --upgrade pip
        pip install ninja wheel setuptools
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu118
      shell: powershell

    - name: Clone Detectron2
      run: git clone https://github.com/facebookresearch/detectron2.git

    - name: Build Detectron2 Wheel (CUDA)
      working-directory: detectron2
      run: |
        $env:DISTUTILS_USE_SDK = "1"
        $env:MSSdk = "1"
        $env:FORCE_CUDA = "1"
        
        $env:MAX_JOBS = "1"
        
        $env:TORCH_CUDA_ARCH_LIST = "6.0;6.1;7.0;7.5;8.0;8.6;8.9"
        
        Write-Host "Building FULL CUDA VERSION..."
        python setup.py bdist_wheel
      shell: powershell

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: detectron2-windows-cuda-wheel
        path: detectron2/dist/*.whl
