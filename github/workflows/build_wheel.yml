name: Build Detectron2 Wheel for Windows

on:
  workflow_dispatch: # هذا السطر يسمح لك بتشغيل البناء يدوياً بضغطة زر

jobs:
  build:
    runs-on: windows-2022 # استخدام سيرفر ويندوز حديث

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # يمكنك تغييرها حسب إصدار بايثون على جهازك

    - name: Install CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.14
      id: cuda-toolkit
      with:
        cuda: '11.8.0' # إصدار كودا (يجب أن يتطابق مع إصدار PyTorch لديك)

    - name: Install PyTorch and Build Tools
      run: |
        python -m pip install --upgrade pip
        pip install ninja wheel setuptools
        # تثبيت PyTorch المتوافق مع كودا 11.8
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu118

    - name: Clone Detectron2 Repository
      run: git clone https://github.com/facebookresearch/detectron2.git

    - name: Build Detectron2 Wheel
      working-directory: detectron2
      env:
        FORCE_CUDA: 1
        DISTUTILS_USE_SDK: 1 # أمر إجباري لنجاح البناء على الويندوز
      run: |
        python setup.py bdist_wheel

    - name: Upload Artifact (The Wheel File)
      uses: actions/upload-artifact@v4
      with:
        name: detectron2-windows-wheel
        path: detectron2/dist/*.whl
